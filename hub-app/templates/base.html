<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Claw Dashboard{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f1117; --surface: #1a1d27; --surface2: #242736;
            --text: #e4e6ed; --text2: #8b8fa3; --accent: #6366f1;
            --green: #22c55e; --red: #ef4444; --yellow: #eab308;
            --border: #2a2d3a; --radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.5;
        }
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 240px; background: var(--surface); border-right: 1px solid var(--border);
            padding: 20px 0; flex-shrink: 0;
        }
        .sidebar-logo {
            padding: 0 20px 20px; font-size: 18px; font-weight: 700;
            border-bottom: 1px solid var(--border); margin-bottom: 10px;
        }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 20px; color: var(--text2); text-decoration: none;
            transition: all 0.2s;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            color: var(--text); background: var(--surface2);
        }
        .sidebar-nav .icon { font-size: 20px; }
        .main { flex: 1; padding: 24px; overflow-y: auto; }
        .page-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; }
        .grid {
            display: grid; gap: 16px;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px;
        }
        .card-title { font-size: 14px; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .kpi-value { font-size: 32px; font-weight: 700; }
        .kpi-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
        .kpi-up { color: var(--green); }
        .kpi-down { color: var(--red); }
        .chart-container { position: relative; height: 250px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; color: var(--text2); font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); }
        td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: var(--surface2); }
        .text-widget { font-size: 14px; color: var(--text2); line-height: 1.7; }
        .stat-row { display: flex; gap: 16px; flex-wrap: wrap; }
        .stat-item { flex: 1; min-width: 120px; }
        .stat-label { font-size: 12px; color: var(--text2); }
        .stat-value { font-size: 20px; font-weight: 600; }
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text2);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { padding: 16px; }
            .grid { grid-template-columns: 1fr; }
            .kpi-value { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="sidebar-logo">📊 Dashboard</div>
            <div class="sidebar-nav">
                <a href="/" class="{% if not module %}active{% endif %}">
                    <span class="icon">🏠</span> Overview
                </a>
                {% for m in modules %}
                <a href="/m/{{ m.id }}" class="{% if module and module.id == m.id %}active{% endif %}">
                    <span class="icon">{{ m.icon or '📊' }}</span> {{ m.name }}
                </a>
                {% endfor %}
            </div>
        </nav>
        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
